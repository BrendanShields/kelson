name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: gates (doctor, spec-lint, kelspec-lint, typecheck, biome, test)
        run: bun run gates
      - name: changelog append-only (PACK-5)
        run: |
          git fetch origin main
          node scripts/changelog-check.mjs "$(git merge-base origin/main HEAD)"

  tlc:
    # LOOP-5/DSL-5: the loop state machine model-checks in CI (TLC).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: model-check KelsonLoop (I1, I2, I3, TypeOK)
        run: |
          curl -sL -o /tmp/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          java -cp /tmp/tla2tools.jar tlc2.TLC -deadlock -workers auto specs/tla/KelsonLoop.tla -config specs/tla/KelsonLoop.cfg
